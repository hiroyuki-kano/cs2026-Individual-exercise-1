<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./list.css">
</head>

<body>
  <div>
    <div class="app">
      <header>
        <div class="user-info">
          <span>ログインユーザー：user01</span>
          <button class="btn-logout">ログアウト</button>
        </div>
      </header>
      <main>
        <div class="todos-page ">
          <div class="header ">
            <h1 class="page-title ">TODO一覧</h1>
            <button class="btn-new ">新規TODO登録</button>
          </div>
          <div class="todo-list ">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>説明</th>
                  <th>作成日時</th>
                  <th>期限</th>
                  <th>完了</th>
                  <th>操作</th>
                  <th>削除</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>テスト</td>
                  <td>2025/7/20</td>
                  <td>2025/8/19</td>
                  <td>未完了</td>
                  <td>
                    <button class="btn-done">完了</button>
                  </td>
                  <td>
                    <button class="btn-delete">削除</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>

</html>
