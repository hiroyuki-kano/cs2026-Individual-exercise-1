<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./new.css">
</head>
<body>
  <div>
    <div class="app ">
      <header>
        <div class="user-info">
          <span>ログインユーザー：user01</span>
          <button class="btn-logout">ログアウト</button>
        </div>
      </header>
      <main>
        <div class="new-todo-page">
          <h1>新規TODO登録</h1>
          <div class="todo-form ">
            <form method="post">
              <div>
                <label for="description">説明：</label>
                <input type="text" id="description" name="description" required>
              </div>
              <div>
                <label for="deadline">期限：</label>
                <input type="date" id="deadline" name="deadline" required>
              </div>
              <button class="btn-submit" type="submit">登録</button>
            </form>
          </div>
          <div class="to-list">
            <button class="btn-to-list">一覧に戻る</button>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
